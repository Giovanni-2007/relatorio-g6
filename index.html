<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G6 Internet · Maio 2026 · Mídia Simples</title>

<meta name="theme-color" content="#0B0D10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --font-serif: 'Fraunces', Georgia, serif;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --green: #22C55E;
  --red: #EF4444;
  --accent: #FF6B1A;
  --accent-2: #E65100;
  --accent-soft: rgba(255,107,26,0.14);
}

[data-theme="dark"] {
  --bg: #0B0D10;
  --bg-card: #131619;
  --bg-card-2: #181B1F;
  --bg-logo-tile: #2A2F36;
  --border: #1F2328;
  --border-strong: #2A2F36;
  --text: #E6E8EB;
  --text-muted: #8B9099;
  --text-dim: #5C6470;
}

[data-theme="light"] {
  --bg: #FAFAF9;
  --bg-card: #FFFFFF;
  --bg-card-2: #F5F5F4;
  --bg-logo-tile: #FFFFFF;
  --border: #E7E5E4;
  --border-strong: #D6D3D1;
  --text: #0C0A09;
  --text-muted: #57534E;
  --text-dim: #A8A29E;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-sans); font-size: 14px;
  transition: background 0.2s, color 0.2s;
}
body { min-height: 100vh; padding-bottom: 80px; }

/* === TOPBAR === */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
}

.brand-wrap { display: flex; align-items: center; gap: 24px; flex-shrink: 0; }
.brand-logo-wrap { display: flex; align-items: center; gap: 14px; }
.brand-logo { height: 64px; width: auto; display: block; }
.brand-logo-wrap .sub {
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 1.5px; text-transform: uppercase;
  padding-left: 12px;
  border-left: 1px solid var(--border-strong);
}
.brand-meta {
  display: flex; gap: 8px; align-items: center;
  padding-left: 18px; border-left: 1px solid var(--border-strong);
  color: var(--text-muted);
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px;
}

.topbar-right { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
.fresh {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-muted); font-size: 11px;
  font-family: var(--font-mono); letter-spacing: 0.5px;
}
.fresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.theme-toggle {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); width: 32px; height: 32px;
  cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s;
}
.theme-toggle:hover { border-color: var(--border-strong); color: var(--text); }

.container { max-width: 1400px; margin: 0 auto; padding: 32px; }

.hero-row {
  display: grid; grid-template-columns: 1.6fr 1fr 1fr;
  gap: 20px; margin-bottom: 24px;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 24px 28px;
  position: relative;
}
.card.accent { border-left: 3px solid var(--accent); }
.card.accent-2 { border-left: 3px solid var(--accent-2); }
.card-label {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--text-muted);
}
.card-meta {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 1px;
  color: var(--text-dim);
}
.card-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px;
}

.hero-value {
  font-family: var(--font-serif);
  font-size: 84px; font-weight: 400;
  line-height: 1; letter-spacing: -3px;
  color: var(--text);
  margin: 10px 0 12px;
}
.kpi-value {
  font-family: var(--font-serif);
  font-size: 42px; font-weight: 400;
  line-height: 1; letter-spacing: -1.5px;
  color: var(--text);
  margin: 10px 0;
}
.kpi-sub { color: var(--text-muted); font-size: 12px; margin-top: 8px; }

.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
}
.pill.up { background: rgba(34,197,94,0.13); color: var(--green); }
.pill.down { background: rgba(239,68,68,0.13); color: var(--red); }
.pill.neutral { background: var(--bg-card-2); color: var(--text-muted); }
.pill.brand { background: var(--accent-soft); color: var(--accent-2); }

.hero-footer {
  display: flex; gap: 32px; align-items: center;
  margin-top: 18px; padding-top: 18px;
  border-top: 1px solid var(--border);
}
.hero-footer .stat-mini { display: flex; flex-direction: column; gap: 4px; }
.hero-footer .stat-mini .lbl {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-dim);
}
.hero-footer .stat-mini .val {
  font-family: var(--font-serif);
  font-size: 22px; color: var(--text);
}

.section-head {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 36px 0 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.section-head h2 {
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 600;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text);
}
.section-head .meta {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-muted);
}

.chart-card { padding-bottom: 18px; }
.chart-wrap { position: relative; height: 280px; margin-top: 14px; }

/* === MIGRAÇÕES === */
.migra-row {
  display: grid;
  grid-template-columns: 28px 1fr 110px 50px;
  gap: 16px; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.migra-row:last-child { border-bottom: 0; }
.migra-rank { color: var(--accent-2); font-family: var(--font-mono); font-size: 11px; }
.migra-nome { color: var(--text); font-size: 13px; }
.migra-bar { height: 6px; background: var(--bg-card-2); position: relative; overflow: hidden; }
.migra-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); }
.migra-qtd { text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--text); }

/* === MIX DE PLANOS === */
.mix-row {
  display: grid;
  grid-template-columns: 32px 1fr 200px 80px 90px;
  gap: 22px; align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.mix-row:last-child { border-bottom: 0; }
.mix-rank { color: var(--accent-2); font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
.mix-info .nome { color: var(--text); font-size: 14px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
.mix-info .meta { color: var(--text-dim); font-family: var(--font-mono); font-size: 10px; }
.mix-bar { position: relative; height: 18px; background: var(--bg-card-2); }
.mix-bar-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--accent); }
.mix-bar-pct {
  position: absolute; top: 50%; right: 6px;
  transform: translateY(-50%);
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  color: var(--text); mix-blend-mode: difference;
}
.mix-spark { height: 36px; }
.mix-total { text-align: right; }
.mix-total .num { font-family: var(--font-serif); font-size: 22px; color: var(--text); line-height: 1; }
.mix-total .lbl {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--text-dim); letter-spacing: 1px;
  text-transform: uppercase; margin-top: 4px;
}

.footer {
  max-width: 1400px; margin: 60px auto 0;
  padding: 24px 32px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px;
  font-family: var(--font-mono); letter-spacing: 0.5px;
}

.empty {
  padding: 40px 20px; text-align: center;
  color: var(--text-dim); font-size: 13px;
}

@media (max-width: 1100px) {
  .hero-row { grid-template-columns: 1fr; }
  .mix-row { grid-template-columns: 24px 1fr 60px; gap: 14px; }
  .mix-row > :nth-child(3), .mix-row > :nth-child(4) { display: none; }
  .container { padding: 20px; }
  .topbar { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
  .hero-value { font-size: 64px; }
  .brand-logo { height: 48px; }
  .brand-logo-wrap .sub { display: none; }
  .brand-meta { display: none; }
  .fresh { display: none; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand-wrap">
    <div class="brand-logo-wrap" id="brand-name"></div>
    <div class="brand-meta">MAIO · 2026</div>
  </div>

  <div class="topbar-right">
    <div class="fresh"><span class="fresh-dot"></span><span id="fresh-label">agora</span> · próx <span id="next-update">15:00</span></div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Tema">☀</button>
  </div>
</header>

<main class="container" id="main-view"></main>

<footer class="footer">
  <div id="footer-ts">g6 · auto · —</div>
  <div>Mídia Simples · Sofia AI</div>
</footer>

<script>
const DATA = {"meta":{"gerado_em":"2026-05-25T08:01:14.583Z","gerado_em_br":"2026-05-25 08:01","mes_nome":"Maio","mes_anterior_nome":"Abril","mes_numero":5,"ano":2026,"dia_atual":25,"dia_atual_fmt":"25/05"},"g6":{"marca":"g6","meta":{"nome":"G6 Internet","cor":"#FF6B1A","cor2":"#E65100"},"kpis":{"total_historico":0,"receita_historica":0,"receita_historica_fmt":"0,00","vendas_mes":0,"vendas_mes_anterior":0,"vendas_dia":0,"receita_mes":0,"receita_mes_fmt":"0,00","ticket_medio":0,"ticket_medio_fmt":"0,00","variacao":null,"variacao_fmt":null,"variacao_dir":null},"serie_diaria":[{"dia":1,"vendas":0},{"dia":2,"vendas":0},{"dia":3,"vendas":0},{"dia":4,"vendas":0},{"dia":5,"vendas":0},{"dia":6,"vendas":0},{"dia":7,"vendas":0},{"dia":8,"vendas":0},{"dia":9,"vendas":0},{"dia":10,"vendas":0},{"dia":11,"vendas":0},{"dia":12,"vendas":0},{"dia":13,"vendas":0},{"dia":14,"vendas":0},{"dia":15,"vendas":0},{"dia":16,"vendas":0},{"dia":17,"vendas":0},{"dia":18,"vendas":0},{"dia":19,"vendas":0},{"dia":20,"vendas":0},{"dia":21,"vendas":0},{"dia":22,"vendas":0},{"dia":23,"vendas":0},{"dia":24,"vendas":0},{"dia":25,"vendas":0},{"dia":26,"vendas":0},{"dia":27,"vendas":0},{"dia":28,"vendas":0},{"dia":29,"vendas":0},{"dia":30,"vendas":0},{"dia":31,"vendas":0}],"top_planos":[],"mix_planos":[],"plano_lider":null}};
let chartDaily = null;

function getTheme() { return localStorage.getItem('g6-theme') || 'dark'; }

function getLogoSrc() {
  return getTheme() === 'dark' ? '/logo-g6-dark.png' : '/logo-g6.png';
}

function fmtNum(n) { return Number(n).toLocaleString('pt-BR'); }
function fmtMoeda(n) { return 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtMoedaCompact(n) { return 'R$ ' + Math.round(Number(n)).toLocaleString('pt-BR'); }

function freshness(isoStr) {
  const then = new Date(isoStr);
  const now = new Date();
  const diffMin = Math.floor((now - then) / 60000);
  if (diffMin < 1) return 'agora';
  if (diffMin < 60) return 'há ' + diffMin + ' min';
  const h = Math.floor(diffMin / 60);
  if (h < 24) return 'há ' + h + 'h';
  return 'há ' + Math.floor(h/24) + 'd';
}
function nextUpdate() {
  const now = new Date();
  for (const h of [9, 15, 18]) {
    if (now.getHours() < h) return String(h).padStart(2,'0') + ':00';
  }
  return '09:00';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function sparkSVG(serie, color) {
  if (!serie.length) return '';
  const max = Math.max(...serie, 1);
  const w = 100, h = 32;
  const stepX = w / (serie.length - 1 || 1);
  const pts = serie.map((v, i) => (i * stepX) + ',' + (h - (v / max) * (h - 4) - 2)).join(' ');
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" style="width:100%; height:100%; display:block">' +
    '<polygon points="' + pts + ' ' + w + ',' + h + ' 0,' + h + '" fill="' + color + '" opacity="0.15"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    '</svg>';
}

function renderHeader() {
  const el = document.getElementById('brand-name');
  el.innerHTML = '<img src="' + getLogoSrc() + '" alt="G6 Internet" class="brand-logo"><span class="sub">Relatório</span>';
}

function renderBody() {
  const b = DATA.g6;
  const meta = DATA.meta;

  if (!b || b.kpis.total_historico === 0) {
    return '<div class="card" style="padding:80px 40px; text-align:center;">' +
      '<div style="font-family:var(--font-mono); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:18px;">G6 Internet</div>' +
      '<div style="font-family:var(--font-serif); font-size:48px; letter-spacing:-1px; margin-bottom:16px;">Aguardando primeiras vendas</div>' +
      '<p style="color:var(--text-muted); max-width:480px; margin:0 auto;">O relatório vai aparecer aqui automaticamente assim que a planilha receber a primeira venda.</p>' +
    '</div>';
  }

  const varArrow = b.kpis.variacao_dir === 'up' ? '▲' : (b.kpis.variacao_dir === 'down' ? '▼' : '');
  const varPill = b.kpis.variacao_fmt
    ? '<span class="pill ' + (b.kpis.variacao_dir || 'neutral') + '">' + varArrow + ' ' + b.kpis.variacao_fmt + ' vs ' + meta.mes_anterior_nome.toLowerCase() + ' (' + fmtNum(b.kpis.vendas_mes_anterior) + ')</span>'
    : '<span class="pill brand">sem comparativo · base nova</span>';

  let planoLiderHtml = '';
  if (b.plano_lider) {
    planoLiderHtml = '<div class="card">' +
      '<div class="card-head"><span class="card-label">Plano líder</span><span class="card-meta">do mês</span></div>' +
      '<div class="kpi-value" style="font-size:22px; line-height:1.3; margin: 14px 0 6px;">' + escapeHtml(b.plano_lider.nome) + '</div>' +
      '<div class="kpi-sub"><span style="color:var(--text); font-family:var(--font-mono); font-size:13px;">' + b.plano_lider.qtd + '</span> contratos · ticket ' + fmtMoeda(b.plano_lider.ticket_medio) + '</div>' +
    '</div>';
  } else {
    planoLiderHtml = '<div class="card"><div class="card-head"><span class="card-label">Plano líder</span></div><div class="empty">sem vendas no mês</div></div>';
  }

  let migraHtml = '';
  if (b.top_planos.length) {
    const max = b.top_planos[0].qtd;
    migraHtml = b.top_planos.map((p, i) => {
      const pct = max > 0 ? (p.qtd / max * 100) : 0;
      return '<div class="migra-row">' +
        '<div class="migra-rank">' + String(i+1).padStart(2,'0') + '</div>' +
        '<div class="migra-nome">' + escapeHtml(p.nome) + '</div>' +
        '<div class="migra-bar"><div class="migra-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="migra-qtd">' + p.qtd + '</div>' +
      '</div>';
    }).join('');
  } else {
    migraHtml = '<div class="empty">Sem vendas neste mês.</div>';
  }

  const accentColor = '#FF6B1A';
  let mixHtml = '';
  if (b.mix_planos.length) {
    const maxMix = b.mix_planos[0].qtd;
    mixHtml = b.mix_planos.map((p, i) => {
      const pct = maxMix > 0 ? (p.qtd / maxMix * 100) : 0;
      const pctTxt = b.kpis.vendas_mes > 0
        ? (p.qtd / b.kpis.vendas_mes * 100).toFixed(1).replace('.', ',') + '%'
        : '0,0%';
      return '<div class="mix-row">' +
        '<div class="mix-rank">' + String(i+1).padStart(2,'0') + '</div>' +
        '<div class="mix-info"><div class="nome">' + escapeHtml(p.nome) + '</div><div class="meta">ticket médio R$ ' + p.ticket_medio_fmt + ' · receita R$ ' + p.receita_fmt + '</div></div>' +
        '<div class="mix-bar"><div class="mix-bar-fill" style="width:' + pct + '%"></div><span class="mix-bar-pct">' + pctTxt + '</span></div>' +
        '<div class="mix-spark">' + sparkSVG(p.serie, accentColor) + '</div>' +
        '<div class="mix-total"><div class="num">' + p.qtd + '</div><div class="lbl">vendas</div></div>' +
      '</div>';
    }).join('');
  } else {
    mixHtml = '<div class="empty">Sem vendas neste mês.</div>';
  }

  return '' +
    // HERO
    '<div class="hero-row">' +
      '<div class="card accent">' +
        '<div class="card-head"><span class="card-label">Total histórico</span><span class="card-meta">acumulado</span></div>' +
        '<div class="hero-value">' + fmtNum(b.kpis.total_historico) + '</div>' +
        '<span class="pill brand">G6 Internet · vendas totais</span>' +
        '<div class="hero-footer">' +
          '<div class="stat-mini"><span class="lbl">Vendas mês</span><span class="val">' + fmtNum(b.kpis.vendas_mes) + '</span></div>' +
          '<div class="stat-mini"><span class="lbl">Vendas dia</span><span class="val">' + fmtNum(b.kpis.vendas_dia) + '</span></div>' +
          '<div class="stat-mini"><span class="lbl">Receita inc.</span><span class="val">' + fmtMoedaCompact(b.kpis.receita_mes) + '</span></div>' +
        '</div>' +
      '</div>' +

      '<div class="card accent-2">' +
        '<div class="card-head"><span class="card-label">Vendas no mês</span><span class="card-meta">vs ' + meta.mes_anterior_nome.toLowerCase().slice(0,3) + '</span></div>' +
        '<div class="kpi-value">' + fmtNum(b.kpis.vendas_mes) + '</div>' +
        '<div class="kpi-sub">' + varPill + '</div>' +
      '</div>' +

      planoLiderHtml +
    '</div>' +

    // GRÁFICO DIÁRIO
    '<div class="card chart-card">' +
      '<div class="card-head"><span class="card-label">Vendas diárias · ' + meta.mes_nome.toLowerCase() + '/' + meta.ano + '</span><span class="card-meta">' + fmtNum(b.kpis.vendas_mes) + ' vendas</span></div>' +
      '<div class="chart-wrap"><canvas id="chartDaily"></canvas></div>' +
    '</div>' +

    // PRA ONDE MIGRAM
    '<div class="section-head"><h2>Pra onde migram</h2><span class="meta">' + b.top_planos.length + ' planos · top ' + Math.min(10, b.top_planos.length) + '</span></div>' +
    '<div class="card">' + migraHtml + '</div>' +

    // MIX DE PLANOS
    '<div class="section-head"><h2>Mix de planos</h2><span class="meta">Top ' + b.mix_planos.length + ' · ' + fmtNum(b.kpis.vendas_mes) + ' vendas no mês</span></div>' +
    '<div class="card">' + mixHtml + '</div>';
}

function renderChart() {
  const b = DATA.g6;
  if (!b || !b.serie_diaria || !b.serie_diaria.length) return;

  const ctx = document.getElementById('chartDaily');
  if (!ctx) return;
  if (chartDaily) chartDaily.destroy();

  const color = '#FF6B1A';
  const labels = b.serie_diaria.map(d => String(d.dia).padStart(2,'0') + '/' + String(DATA.meta.mes_numero).padStart(2,'0'));
  const values = b.serie_diaria.map(d => d.vendas);
  const hoje = DATA.meta.dia_atual;

  const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), bb = parseInt(color.slice(5,7),16);
  const colors = b.serie_diaria.map(d => {
    const a = d.vendas === 0 ? 0.18 : (d.dia === hoje ? 0.7 : 1);
    return 'rgba(' + r + ',' + g + ',' + bb + ',' + a + ')';
  });

  const textMuted = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
  const borderCol = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  const bgTooltip = getComputedStyle(document.documentElement).getPropertyValue('--bg-card').trim();
  const textCol = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();

  chartDaily = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 0, barPercentage: 0.7, categoryPercentage: 0.85 }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: bgTooltip,
          borderColor: borderCol, borderWidth: 1,
          titleColor: textCol, bodyColor: textCol,
          titleFont: { family: 'JetBrains Mono', size: 10 },
          bodyFont: { family: 'Inter', size: 12 },
          padding: 10, displayColors: false, cornerRadius: 0,
          callbacks: {
            title: (items) => items[0].label,
            label: (item) => item.parsed.y + ' venda' + (item.parsed.y === 1 ? '' : 's')
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: textMuted, font: { family: 'JetBrains Mono', size: 9 }, autoSkip: true, autoSkipPadding: 10, maxRotation: 0 }},
        y: { beginAtZero: true, grid: { color: borderCol }, ticks: { color: textMuted, font: { family: 'JetBrains Mono', size: 9 }, stepSize: 1, precision: 0 }}
      }
    }
  });
}

function render() {
  document.documentElement.setAttribute('data-theme', getTheme());
  renderHeader();
  document.getElementById('main-view').innerHTML = renderBody();
  setTimeout(renderChart, 50);

  document.getElementById('fresh-label').textContent = freshness(DATA.meta.gerado_em);
  document.getElementById('next-update').textContent = nextUpdate();
  document.getElementById('footer-ts').textContent = 'g6 · auto · ' + DATA.meta.gerado_em_br;
  document.getElementById('theme-toggle').textContent = getTheme() === 'dark' ? '☀' : '◐';
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  localStorage.setItem('g6-theme', getTheme() === 'dark' ? 'light' : 'dark');
  render();
});

render();
</script>
</body>
</html>
